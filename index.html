<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travellian</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link rel="stylesheet" href="assets/css/_variables.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>

    <header class="main-header">

      <!-- NAVBAR -->
      <div class="navbar d-flex vertical-center">
        <nav class="d-flex vertical-center">

          <div class="logo d-flex">
            <img src="assets/images/icons/logo.svg" alt="Travellian" />
          </div>

          <!-- MENU -->
          
          <div id="iconBlock" class="menu-icon">
            <div id="iconOpen" class="menu-icon-open">
              <img src="assets/images/icons/burger-menu.svg" alt="Menu" />
            </div>
            <div id="iconClose" class="menu-icon-close d-none">
              <i class="fa-solid fa-xmark"></i>
            </div>
          </div>
          <ul id="mainMenu" class="main-menu d-flex">
          <li><a href="#">Home</a></li>
          <li><a href="#">Explore</a></li>
          <li><a href="#">Travel</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Pricing</a></li>
        </ul>

          <div class="nav-actions d-flex">
            <button class="btn btn-outline">Login</button>
            <button class="btn btn-primary">Sign Up</button>
          </div>

        </nav>
      </div>

      <!-- HERO -->
      <div class="hero content-wrap">
        <h1 class="hero-title">Start your unforgettable journey with us.</h1>
        <p class="hero-subtitle">The best travel for your journey begins now</p>
      </div>

      <!-- BOOKING FORM -->
      <div class="booking-wrap">
        <form class="booking-form content-wrap d-flex" novalidate>

          <div class="form-field-wrap">
            <label class="form-label" for="destination">Destination</label>
            <input class="form-input" type="text" value="Dubai" />
          </div>

          <div class="form-field-wrap">
            <label class="form-label" for="person">Person</label>
            <div class="select-wrapper">
              <select class="form-select">
                <option>1</option>
                <option selected>2</option>
                <option>3</option>
                <option>4</option>
              </select>
              <img class="arrow-book" src="assets/images/icons/arrow-book.svg" alt="Arrow" />
            </div>
          </div>

          <div class="form-field-wrap">
            <label class="form-label">Check In</label>
              <div class="select-wrapper">
                <select class="form-select">
                  <option>Sun, 17th Sep 2020</option>
                </select>
                <img class="arrow-book" src="assets/images/icons/arrow-book.svg" alt="Arrow" />
            </div>
          </div>

          <div class="form-field-wrap">
            <label class="form-label">Check Out</label>
              <div class="select-wrapper">
                <select class="form-select">
                  <option>Tue, 17th Oct 2020</option>
                </select>
                <img class="arrow-book" src="assets/images/icons/arrow-book.svg" alt="Arrow" />
            </div>
          </div>

          <button type="submit" class="btn btn-book">
            Book Now
            <i class="fa-solid fa-arrow-right"></i>
          </button>

        </form>
      </div>

    </header>

    <main>
      <section></section>
    </main>

    <footer></footer>

    <script src="assets/js/main.js"></script>
  </body>
</html>
